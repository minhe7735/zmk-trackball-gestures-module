description: |
  Module-level configuration for trackball gesture emulation.
  This node is optional — sensible defaults are used if it is absent.

  Example:
    / {
        trackball_gestures {
            compatible = "zmk,trackball-gestures";
            sensitivity = <15>;
        };
    };

compatible: "zmk,trackball-gestures"

properties:
  sensitivity:
    type: int
    default: 10
    description: |
      Multiplier for converting raw trackball deltas into virtual touchpad
      coordinate changes.  Higher values make gestures more responsive.

  touchpad-width:
    type: int
    default: 4095
    description: |
      Logical X-axis maximum of the virtual touchpad surface.
      Coordinates range from 0 to this value (inclusive).

  touchpad-height:
    type: int
    default: 4095
    description: |
      Logical Y-axis maximum of the virtual touchpad surface.
      Coordinates range from 0 to this value (inclusive).
